# ==========================================================================
# Model routing: virtual model names that map to provider pools
# ==========================================================================
# 주의: routing에 포함된 provider도 위에서 enabled: true여야 실제로 사용됩니다.
routing:
  auto:
    strategy: "round_robin"
    providers: ["deepseek", "qwen", "gemini", "chatgpt", "aistudio"]
  best-free:
    strategy: "priority"
    providers: ["deepseek", "chatgpt", "gemini", "qwen"]
  all-available:
    strategy: "round_robin"
    providers: ["deepseek", "qwen", "gemini", "chatgpt", "aistudio", "groq", "huggingchat",
      "mistral", "duckai", "copilot", "perplexity", "openrouter", "kimi", "doubao",
      "chatglm", "yichat", "coze", "you", "pi", "metaai", "claude"]

